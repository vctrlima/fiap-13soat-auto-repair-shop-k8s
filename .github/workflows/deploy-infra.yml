# =============================================================================
# Deploy K8s Infrastructure (EKS) via Terraform
# Triggered on push to main (terraform/** changes)
# Flow: Staging (auto) → Production (manual approval)
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  TERRAFORM_VERSION: "1.5.7"
  WORKING_DIR: terraform
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

# -----------------------------------------------------------------------------
# Staging
# -----------------------------------------------------------------------------
jobs:
  deploy-staging:
    name: "Deploy Staging"
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: terraform-staging
      cancel-in-progress: false

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config=environments/staging/backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/staging/terraform.tfvars \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_access_token_secret=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}" \
            -var="jwt_refresh_token_secret=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install EKS add-ons
        run: |
          aws eks update-kubeconfig \
            --name auto-repair-shop-staging \
            --region ${{ env.AWS_REGION }}

          # External Secrets Operator
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets --create-namespace \
            --set installCRDs=true \
            --wait --timeout=300s

          # AWS Load Balancer Controller
          LB_ROLE_ARN=$(terraform output -raw load_balancer_controller_role_arn)
          VPC_ID=$(terraform output -raw vpc_id)
          helm repo add eks https://aws.github.io/eks-charts
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=auto-repair-shop-staging \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$LB_ROLE_ARN" \
            --wait --timeout=300s

          # Prometheus + Alertmanager (for alerting rules evaluation)
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          # Clean up any failed previous release
          if helm status kube-prometheus-stack -n monitoring 2>/dev/null | grep -q 'STATUS: failed'; then
            helm uninstall kube-prometheus-stack -n monitoring --wait || true
            kubectl delete jobs -n monitoring -l app.kubernetes.io/instance=kube-prometheus-stack --ignore-not-found
          fi
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --set prometheus.prometheusSpec.additionalScrapeConfigs[0].job_name=otel-collector \
            --set prometheus.prometheusSpec.additionalScrapeConfigs[0].static_configs[0].targets[0]=otel-collector.monitoring.svc.cluster.local:8889 \
            --set alertmanager.enabled=true \
            --set grafana.enabled=false \
            --atomic --timeout=600s

  # ---------------------------------------------------------------------------
  # Production
  # ---------------------------------------------------------------------------
  deploy-production:
    name: "Deploy Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    concurrency:
      group: terraform-production
      cancel-in-progress: false

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-production
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config=environments/production/backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/production/terraform.tfvars \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_access_token_secret=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}" \
            -var="jwt_refresh_token_secret=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install EKS add-ons
        run: |
          aws eks update-kubeconfig \
            --name auto-repair-shop-cluster \
            --region ${{ env.AWS_REGION }}

          # External Secrets Operator
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets --create-namespace \
            --set installCRDs=true \
            --wait --timeout=300s

          # AWS Load Balancer Controller
          LB_ROLE_ARN=$(terraform output -raw load_balancer_controller_role_arn)
          VPC_ID=$(terraform output -raw vpc_id)
          helm repo add eks https://aws.github.io/eks-charts
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=auto-repair-shop-cluster \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$LB_ROLE_ARN" \
            --wait --timeout=300s

          # Prometheus + Alertmanager (for alerting rules evaluation)
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          # Clean up any failed previous release
          if helm status kube-prometheus-stack -n monitoring 2>/dev/null | grep -q 'STATUS: failed'; then
            helm uninstall kube-prometheus-stack -n monitoring --wait || true
            kubectl delete jobs -n monitoring -l app.kubernetes.io/instance=kube-prometheus-stack --ignore-not-found
          fi
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --set prometheus.prometheusSpec.additionalScrapeConfigs[0].job_name=otel-collector \
            --set prometheus.prometheusSpec.additionalScrapeConfigs[0].static_configs[0].targets[0]=otel-collector.monitoring.svc.cluster.local:8889 \
            --set alertmanager.enabled=true \
            --set grafana.enabled=false \
            --atomic --timeout=600s
