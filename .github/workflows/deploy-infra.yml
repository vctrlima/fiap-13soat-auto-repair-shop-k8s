# =============================================================================
# Deploy K8s Infrastructure (EKS) via Terraform
# Triggered on push to main (terraform/** changes)
# Flow: Staging (auto) → Production (manual approval)
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  TERRAFORM_VERSION: "1.5.7"
  WORKING_DIR: terraform
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

# -----------------------------------------------------------------------------
# Staging
# -----------------------------------------------------------------------------
jobs:
  deploy-staging:
    name: "Deploy Staging"
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: terraform-staging
      cancel-in-progress: false

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/staging/terraform.tfvars \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_access_token_secret=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}" \
            -var="jwt_refresh_token_secret=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------------------
  # Production
  # ---------------------------------------------------------------------------
  deploy-production:
    name: "Deploy Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    concurrency:
      group: terraform-production
      cancel-in-progress: false

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-production
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/production/terraform.tfvars \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_access_token_secret=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}" \
            -var="jwt_refresh_token_secret=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
